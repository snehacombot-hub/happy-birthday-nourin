<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Nourin 🌸</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* 📸 Background */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url("image1.png") center/cover no-repeat;
    transition: 1s ease-in-out;
}

/* 💗 Pink overlay */
.bg::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(255, 120, 150, 0.6);
}

/* 💌 Text */
.content {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    text-align: center;
    z-index: 2;
    transition: 0.5s;
}

h1 {
    font-size: 40px;
}

p {
    font-size: 18px;
    margin-top: 10px;
}

/* 🌸 Petals */
.petals span {
    position: absolute;
    width: 15px;
    height: 15px;
    background: pink;
    border-radius: 50%;
    animation: fall linear infinite;
}

@keyframes fall {
    0% { transform: translateY(-10px); }
    100% { transform: translateY(100vh); }
}
</style>

</head>

<body>

<div class="bg" id="bg"></div>

<div class="petals" id="petals"></div>

<div class="content">
    <h1>Happy Birthday Nourin 🌸</h1>
    <p id="message">Wishing you a very happy birthday! 🎂✨</p>
</div>

<!-- 🎶 Music -->
<audio id="bgMusic" loop>
    <source src="Until_I_Found_You.mp3" type="audio/mpeg">
</audio>

<script>

// 🌸 Petals
const container = document.getElementById("petals");

for (let i = 0; i < 20; i++) {
    let petal = document.createElement("span");
    petal.style.left = Math.random() * 100 + "vw";
    petal.style.animationDuration = (3 + Math.random() * 5) + "s";
    container.appendChild(petal);
}

// 📸 Image slideshow
const images = ["image1.png", "image2.png", "image3.jpg"];
let i = 0;
const bg = document.getElementById("bg");

setInterval(() => {
    i = (i + 1) % images.length;
    bg.style.background = `url(${images[i]}) center/cover no-repeat`;
}, 3000);

// 💌 Message change
const messages = [
    "Wishing you a very happy birthday! 🎂✨",
    "Hope your day is full of happiness and smiles 😊",
    "May this year bring you success and good vibes 💫"
];

let j = 0;
const text = document.getElementById("message");

setInterval(() => {
    j = (j + 1) % messages.length;
    text.innerText = messages[j];
}, 4000);

// 🎶 Play music on first click
document.body.addEventListener("click", function () {
    document.getElementById("bgMusic").play();
}, { once: true });

</script>

</body>
</html>
